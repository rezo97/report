<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კურიერების კონტროლი</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; padding: 20px; border: 2px dashed #bdc3c7; border-radius: 8px; background: #fafafa; }
        h3 { margin-top: 0; font-size: 16px; }
        p { font-size: 12px; color: #7f8c8d; }
        .btn { display: block; width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .btn:hover { background: #2980b9; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .status-დროული { color: #27ae60; font-weight: bold; }
        .status-ადრე { color: #f39c12; font-weight: bold; }
        .status-გვიან { color: #e74c3c; font-weight: bold; }
        .comment-input { padding: 6px; border: 1px solid #ccc; border-radius: 3px; width: 120px; }
        .save-btn { padding: 6px 10px; background: #2ecc71; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 შეკვეთების კონტროლი (ოფლაინ ვერსია)</h2>
        <div class="upload-section">
            <div class="card">
                <h3>1. ფაქტიური ჩაბარება</h3>
                <p>სვეტები: order_id, time, date, courier</p>
                <input type="file" id="actualFile" accept=".xlsx, .xls">
            </div>
            <div class="card">
                <h3>2. მომხმარებლის მოთხოვნა</h3>
                <p>სვეტები: order_id, requested_time, requested_date</p>
                <input type="file" id="requestedFile" accept=".xlsx, .xls">
            </div>
        </div>
        <button class="btn" onclick="processData()">მონაცემების შედარება</button>
        <table id="resultsTable" style="display:none;">
            <thead>
                <tr>
                    <th>შეკვეთის #</th><th>კურიერი</th><th>მოთხოვნილი</th><th>ფაქტიური</th><th>სტატუსი</th><th>კომენტარი</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let actualData = [], requestedData = [];

        function readExcel(fileId, callback) {
            const file = document.getElementById(fileId).files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                callback(json);
            };
            reader.readAsArrayBuffer(file);
        }

        document.getElementById('actualFile').addEventListener('change', () => readExcel('actualFile', d => actualData = d));
        document.getElementById('requestedFile').addEventListener('change', () => readExcel('requestedFile', d => requestedData = d));

        window.processData = function() {
            if(!actualData.length || !requestedData.length) {
                alert("გთხოვთ ატვირთოთ ორივე ფაილი!");
                return;
            }
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            requestedData.forEach(req => {
                const actual = actualData.find(a => String(a.order_id) === String(req.order_id));
                if(actual) {
                    const status = calcStatus(req.requested_date, req.requested_time, actual.date, actual.time);
                    
                    // კომენტარის წამოღება ლოკალური მეხსიერებიდან
                    const savedComment = localStorage.getItem('comment_' + req.order_id) || '';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${req.order_id}</td>
                        <td>${actual.courier || '-'}</td>
                        <td>${req.requested_date} <br> ${req.requested_time}</td>
                        <td>${actual.date} <br> ${actual.time}</td>
                        <td class="status-${status}">${status}</td>
                        <td>
                            <input type="text" id="c-${req.order_id}" class="comment-input" value="${savedComment}" placeholder="მიზეზი...">
                            <button class="save-btn" onclick="saveComment('${req.order_id}')">OK</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
            document.getElementById('resultsTable').style.display = 'table';
        }

        function calcStatus(reqD, reqT, actD, actT) {
            if (String(reqD) !== String(actD)) return "გვიან";
            try {
                let [s, e] = String(reqT).split('-');
                let a = parseInt(String(actT).replace(':', ''));
                let start = parseInt(s.trim().replace(':', ''));
                let end = parseInt(e.trim().replace(':', ''));
                
                if (a >= start && a <= end) return "დროული";
                return a < start ? "ადრე" : "გვიან";
            } catch { return "ფორმატის შეცდომა"; }
        }

        window.saveComment = function(id) {
            const val = document.getElementById('c-' + id).value;
            localStorage.setItem('comment_' + id, val);
            alert('კომენტარი შენახულია!');
        }
    </script>
</body>
</html>
