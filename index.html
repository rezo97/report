<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კურიერების კონტროლი</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --success-bg: #d1fae5; --success-text: #065f46;
            --warning-bg: #fef3c7; --warning-text: #92400e;
            --danger-bg: #fee2e2;  --danger-text: #991b1b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            padding: 30px 20px; 
            margin: 0;
            line-height: 1.5;
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .header-title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        /* ბარათების სექცია */
        .upload-section { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 24px; 
            margin-bottom: 24px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        .card h3 { margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--text-main); }
        .card p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        
        .template-link { 
            font-size: 13px; color: var(--primary); cursor: pointer; 
            text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 12px; background: #e0e7ff; border-radius: 6px; margin-bottom: 16px; transition: 0.2s;
        }
        .template-link:hover { background: #c7d2fe; }

        /* ფაილის ასატვირთი ველის სტილი */
        input[type="file"] {
            font-size: 14px; color: var(--text-muted); width: 100%;
        }
        input[type="file"]::file-selector-button {
            border: 1px solid var(--border-color); background: #f9fafb; color: var(--text-main);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500;
            margin-right: 12px; transition: 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background: #f3f4f6; }

        /* მთავარი ღილაკი */
        .btn-primary { 
            display: block; width: 100%; padding: 16px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:active { transform: scale(0.99); }

        /* დეშბორდი */
        .dashboard-container { 
            display: none; margin-top: 40px; animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-row { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; 
        }
        
        .stat-card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px;
            border: 1px solid var(--border-color); border-left: 4px solid var(--text-muted);
        }
        .stat-card.ontime { border-left-color: #10b981; }
        .stat-card.early { border-left-color: #f59e0b; }
        .stat-card.late { border-left-color: #ef4444; }

        .stat-title { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--text-main); }

        /* ფილტრები */
        .filters-section {
            background: var(--card-bg); padding: 16px 24px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); border: 1px solid var(--border-color); margin-bottom: 24px;
        }
        
        .filters-group { display: flex; gap: 20px; align-items: center; }
        .filter-label { font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; user-select: none; }
        .filter-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

        .btn-export { 
            padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-export:hover { background: #059669; }

        /* ცხრილი */
        .table-wrapper {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border-color);
            display: none;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { 
            background: #f9fafb; color: var(--text-muted); font-size: 12px; 
            text-transform: uppercase; font-weight: 600; padding: 16px 24px; letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color);
        }
        td { padding: 16px 24px; border-bottom: 1px solid var(--border-color); vertical-align: middle; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9fafb; }

        /* სტატუსის ბეიჯები */
        .badge { 
            display: inline-flex; align-items: center; padding: 6px 12px; 
            border-radius: 9999px; font-size: 12px; font-weight: 600; 
        }
        .badge-ontime { background: var(--success-bg); color: var(--success-text); }
        .badge-early { background: var(--warning-bg); color: var(--warning-text); }
        .badge-late { background: var(--danger-bg); color: var(--danger-text); }

        /* კომენტარის ველი */
        .comment-cell { display: flex; gap: 8px; }
        .comment-input { 
            padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; 
            font-size: 13px; width: 160px; outline: none; transition: 0.2s; background: #f9fafb;
        }
        .comment-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .save-btn { 
            padding: 8px 16px; background: var(--bg-color); color: var(--text-main); 
            border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; 
            font-weight: 500; transition: 0.2s; font-size: 13px;
        }
        .save-btn:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">📦 შეკვეთების მართვის პანელი</h2>
        
        <div class="upload-section">
            <div class="card">
                <h3>Dressiver info</h3>
                <p>order_id, time, date, courier</p>
                <div class="template-link" onclick="downloadTemplate('actual')">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    შაბლონის გადმოწერა
                </div>
                <input type="file" id="actualFile" accept=".xlsx, .xls">
            </div>
            
            <div class="card">
                <h3>Prestashop info</h3>
                <p>order_id, requested_time, requested_date</p>
                <div class="template-link" onclick="downloadTemplate('requested')">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    შაბლონის გადმოწერა
                </div>
                <input type="file" id="requestedFile" accept=".xlsx, .xls">
            </div>
        </div>
        
        <button class="btn-primary" onclick="processData()">მონაცემების სინქრონიზაცია და შედარება</button>

        <div id="dashboardArea" class="dashboard-container">
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-title">სულ შეკვეთა</span>
                    <span class="stat-value" id="val-total">0</span>
                </div>
                <div class="stat-card ontime">
                    <span class="stat-title">დროული</span>
                    <span class="stat-value" id="val-ontime">0%</span>
                </div>
                <div class="stat-card early">
                    <span class="stat-title">ადრე</span>
                    <span class="stat-value" id="val-early">0%</span>
                </div>
                <div class="stat-card late">
                    <span class="stat-title">გვიან</span>
                    <span class="stat-value" id="val-late">0%</span>
                </div>
            </div>
            
            <div class="filters-section">
                <div class="filters-group">
                    <span style="font-size: 14px; color: var(--text-muted); font-weight: 600;">ფილტრი:</span>
                    <label class="filter-label"><input type="checkbox" id="chk-ontime" checked onchange="renderTable()"> დროული</label>
                    <label class="filter-label"><input type="checkbox" id="chk-early" checked onchange="renderTable()"> ადრე</label>
                    <label class="filter-label"><input type="checkbox" id="chk-late" checked onchange="renderTable()"> გვიან</label>
                </div>
                <button class="btn-export" onclick="exportExcel()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    ექსპორტი
                </button>
            </div>
        </div>

        <div class="table-wrapper" id="resultsTable">
            <table>
                <thead>
                    <tr>
                        <th>შეკვეთის #</th>
                        <th>კურიერი</th>
                        <th>მოთხოვნილი</th>
                        <th>ფაქტიური</th>
                        <th>სტატუსი</th>
                        <th>კომენტარი</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let actualData = [], requestedData = [];
        let globalResults = []; 
        let filteredResults = []; 

        window.downloadTemplate = function(type) {
            let wsData = [];
            let fileName = "";
            if(type === 'actual') {
                wsData = [["order_id", "time", "date", "courier"]];
                fileName = "Template_Actual_Delivery.xlsx";
            } else {
                wsData = [["order_id", "requested_time", "requested_date"]];
                fileName = "Template_User_Request.xlsx";
            }
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "შაბლონი");
            XLSX.writeFile(wb, fileName);
        }

        function readExcel(fileId, callback) {
            const file = document.getElementById(fileId).files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {raw: false, defval: ""});
                callback(json);
            };
            reader.readAsArrayBuffer(file);
        }

        document.getElementById('actualFile').addEventListener('change', () => readExcel('actualFile', d => actualData = d));
        document.getElementById('requestedFile').addEventListener('change', () => readExcel('requestedFile', d => requestedData = d));

        window.processData = function() {
            if(!actualData.length || !requestedData.length) {
                alert("გთხოვთ ატვირთოთ ორივე ფაილი მონაცემების შესადარებლად.");
                return;
            }
            
            globalResults = [];
            
            requestedData.forEach(req => {
                const actual = actualData.find(a => String(a.order_id) === String(req.order_id));
                if(actual) {
                    const status = calcStatus(req.requested_date, req.requested_time, actual.date, actual.time);
                    const savedComment = localStorage.getItem('comment_' + req.order_id) || '';
                    
                    globalResults.push({
                        order_id: req.order_id,
                        courier: actual.courier || '-',
                        req_info: `<div style="font-weight: 500;">${req.requested_date}</div><div style="color: var(--text-muted); font-size: 12px;">${req.requested_time}</div>`,
                        act_info: `<div style="font-weight: 500;">${actual.date}</div><div style="color: var(--text-muted); font-size: 12px;">${actual.time}</div>`,
                        status: status,
                        comment: savedComment,
                        raw_req_info: `${req.requested_date} ${req.requested_time}`, 
                        raw_act_info: `${actual.date} ${actual.time}`
                    });
                }
            });

            updateDashboard();
            renderTable();
            document.getElementById('dashboardArea').style.display = 'block';
            document.getElementById('resultsTable').style.display = 'block';
        }

        function calcStatus(reqD, reqT, actD, actT) {
            if (String(reqD) !== String(actD)) return "გვიან";
            try {
                let [s, e] = String(reqT).split('-');
                let actNum = parseInt(String(actT).replace(':', '').replace(/\D/g,''));
                let startNum = parseInt(s.replace(':', '').replace(/\D/g,''));
                let endNum = parseInt(e.replace(':', '').replace(/\D/g,''));
                
                if (actNum >= startNum && actNum <= endNum) return "დროული";
                return actNum < startNum ? "ადრე" : "გვიან";
            } catch { return "შეცდომა"; }
        }

        function updateDashboard() {
            const total = globalResults.length;
            if(total === 0) return;

            const onTime = globalResults.filter(i => i.status === 'დროული').length;
            const early = globalResults.filter(i => i.status === 'ადრე').length;
            const late = globalResults.filter(i => i.status === 'გვიან').length;

            document.getElementById('val-total').innerText = total;
            document.getElementById('val-ontime').innerHTML = `${((onTime/total)*100).toFixed(1)}% <span style="font-size: 14px; font-weight: normal; color: var(--text-muted);">(${onTime})</span>`;
            document.getElementById('val-early').innerHTML = `${((early/total)*100).toFixed(1)}% <span style="font-size: 14px; font-weight: normal; color: var(--text-muted);">(${early})</span>`;
            document.getElementById('val-late').innerHTML = `${((late/total)*100).toFixed(1)}% <span style="font-size: 14px; font-weight: normal; color: var(--text-muted);">(${late})</span>`;
        }

        function getBadgeHtml(status) {
            if (status === 'დროული') return '<span class="badge badge-ontime">დროული</span>';
            if (status === 'ადრე') return '<span class="badge badge-early">ადრე</span>';
            if (status === 'გვიან') return '<span class="badge badge-late">გვიან</span>';
            return `<span class="badge" style="background:#e5e7eb; color:#374151;">${status}</span>`;
        }

        window.renderTable = function() {
            const showOnTime = document.getElementById('chk-ontime').checked;
            const showEarly = document.getElementById('chk-early').checked;
            const showLate = document.getElementById('chk-late').checked;

            filteredResults = globalResults.filter(item => {
                if(item.status === 'დროული' && showOnTime) return true;
                if(item.status === 'ადრე' && showEarly) return true;
                if(item.status === 'გვიან' && showLate) return true;
                if(item.status === 'შეცდომა') return true; 
                return false;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            filteredResults.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 500;">${item.order_id}</td>
                    <td>${item.courier}</td>
                    <td>${item.req_info}</td>
                    <td>${item.act_info}</td>
                    <td>${getBadgeHtml(item.status)}</td>
                    <td>
                        <div class="comment-cell">
                            <input type="text" id="c-${item.order_id}" class="comment-input" value="${item.comment}" placeholder="მიზეზი..." onchange="updateTempComment('${item.order_id}', this.value)">
                            <button class="save-btn" onclick="saveComment('${item.order_id}')">შენახვა</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.updateTempComment = function(id, val) {
            const item = globalResults.find(i => String(i.order_id) === String(id));
            if(item) item.comment = val;
        }

        window.saveComment = function(id) {
            const val = document.getElementById('c-' + id).value;
            localStorage.setItem('comment_' + id, val);
            updateTempComment(id, val);
            
            // ვიზუალური დადასტურება ღილაკზე
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "✔";
            btn.style.background = "#d1fae5";
            btn.style.borderColor = "#10b981";
            btn.style.color = "#065f46";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
                btn.style.borderColor = "";
                btn.style.color = "";
            }, 1500);
        }

        window.exportExcel = function() {
            if(filteredResults.length === 0) {
                alert("მონაცემები არაა საჩვენებლად!");
                return;
            }

            const wsData = [["შეკვეთის #", "კურიერი", "მოთხოვნილი დრო/თარიღი", "ფაქტიური დრო/თარიღი", "სტატუსი", "კომენტარი"]];
            
            filteredResults.forEach(item => {
                wsData.push([
                    item.order_id, 
                    item.courier, 
                    item.raw_req_info, 
                    item.raw_act_info, 
                    item.status, 
                    item.comment
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "შედეგები");
            XLSX.writeFile(wb, "Courier_Report.xlsx");
        }
    </script>
</body>
</html>
